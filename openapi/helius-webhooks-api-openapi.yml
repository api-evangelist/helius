tags:
- name: Webhooks
  description: Configure real-time blockchain notifications for any Solana address, transaction type, or on-chain event with customizable delivery options.
paths:
  /v0/webhooks:
    get:
      tags:
      - Webhooks
      summary: Returns all webhooks.
      operationId: webhooks_getWebhooks
      description: 'Retrieve a complete list of all configured webhooks for your API key with detailed

        configuration information including trigger conditions, delivery endpoints, and status.

        '
      parameters:
      - $ref: '#/components/parameters/apiKeyParam'
      responses:
        '200':
          description: Webhooks for the given API key.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Webhooks_Webhook'
        '400':
          $ref: '#/components/responses/Webhooks_400-BadRequest'
        '401':
          $ref: '#/components/responses/Webhooks_401-Unauthorized'
        '403':
          $ref: '#/components/responses/Webhooks_403-Forbidden'
        '404':
          $ref: '#/components/responses/Webhooks_404-NotFound'
        '429':
          $ref: '#/components/responses/Webhooks_429-TooManyRequests'
        '500':
          $ref: '#/components/responses/Webhooks_500-InternalServerError'
        '503':
          $ref: '#/components/responses/Webhooks_503-ServiceUnavailable'
        '504':
          $ref: '#/components/responses/Webhooks_504-GatewayTimeout'
      x-amazon-apigateway-integration:
        httpMethod: GET
        type: http_proxy
        uri: http://PLACEHOLDER_VIEW_LAYER_DNS_NAME/webhooks
        connectionType: VPC_LINK
        connectionId: PLACEHOLDER_VPC_LINK_ID
      servers:
      - url: https://api-mainnet.helius-rpc.com
    post:
      tags:
      - Webhooks
      summary: Creates a webhook.
      operationId: webhooks_createWebhook
      description: "Create a new webhook for real-time Solana blockchain notifications. Configure triggers \nbased on addresses, transaction types, or specific on-chain events. Customize delivery \noptions and notification formatting for seamless integration with your application.\n"
      parameters:
      - $ref: '#/components/parameters/apiKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Webhooks_CreateWebhookRequest'
      responses:
        '200':
          description: The created webhook.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhooks_Webhook'
        '400':
          $ref: '#/components/responses/Webhooks_400-BadRequest'
        '401':
          $ref: '#/components/responses/Webhooks_401-Unauthorized'
        '429':
          $ref: '#/components/responses/Webhooks_429-TooManyRequests'
        '500':
          $ref: '#/components/responses/Webhooks_500-InternalServerError'
        '503':
          $ref: '#/components/responses/Webhooks_503-ServiceUnavailable'
        '504':
          $ref: '#/components/responses/Webhooks_504-GatewayTimeout'
      x-amazon-apigateway-integration:
        httpMethod: POST
        type: http_proxy
        uri: http://PLACEHOLDER_VIEW_LAYER_DNS_NAME/webhooks
        connectionType: VPC_LINK
        connectionId: PLACEHOLDER_VPC_LINK_ID
      servers:
      - url: https://api-mainnet.helius-rpc.com
  /v0/webhooks/{webhookID}:
    get:
      tags:
      - Webhooks
      summary: Returns given Webhook.
      operationId: webhooks_getWebhook
      description: 'Retrieve detailed information about a specific webhook configuration by its unique ID.

        Access complete webhook settings including trigger conditions, delivery endpoints, and status metrics.

        '
      parameters:
      - $ref: '#/components/parameters/Webhooks_webhookIDParam'
      - $ref: '#/components/parameters/apiKeyParam'
      responses:
        '200':
          description: Returns details about the given webhook ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhooks_Webhook'
        '400':
          $ref: '#/components/responses/Webhooks_400-BadRequest'
        '401':
          $ref: '#/components/responses/Webhooks_401-Unauthorized'
        '403':
          $ref: '#/components/responses/Webhooks_403-Forbidden'
        '404':
          $ref: '#/components/responses/Webhooks_404-NotFound'
        '429':
          $ref: '#/components/responses/Webhooks_429-TooManyRequests'
        '500':
          $ref: '#/components/responses/Webhooks_500-InternalServerError'
        '503':
          $ref: '#/components/responses/Webhooks_503-ServiceUnavailable'
        '504':
          $ref: '#/components/responses/Webhooks_504-GatewayTimeout'
      x-amazon-apigateway-integration:
        httpMethod: GET
        type: http_proxy
        uri: http://PLACEHOLDER_VIEW_LAYER_DNS_NAME/webhooks/{webhookID}
        connectionType: VPC_LINK
        connectionId: PLACEHOLDER_VPC_LINK_ID
        requestParameters:
          integration.request.path.webhookID: method.request.path.webhookID
      servers:
      - url: https://api-mainnet.helius-rpc.com
    put:
      tags:
      - Webhooks
      summary: Edits a webhook.
      operationId: webhooks_editWebhook
      description: 'Update an existing webhook configuration with new trigger conditions, delivery endpoints,

        or notification formatting. Modify your real-time blockchain notification settings to adapt

        to changing application requirements without service interruption.

        '
      parameters:
      - $ref: '#/components/parameters/Webhooks_webhookIDParam'
      - $ref: '#/components/parameters/apiKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Webhooks_CreateWebhookRequest'
      responses:
        '200':
          description: The edited webhook.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhooks_Webhook'
        '400':
          $ref: '#/components/responses/Webhooks_400-BadRequest'
        '401':
          $ref: '#/components/responses/Webhooks_401-Unauthorized'
        '403':
          $ref: '#/components/responses/Webhooks_403-Forbidden'
        '404':
          $ref: '#/components/responses/Webhooks_404-NotFound'
        '429':
          $ref: '#/components/responses/Webhooks_429-TooManyRequests'
        '500':
          $ref: '#/components/responses/Webhooks_500-InternalServerError'
        '503':
          $ref: '#/components/responses/Webhooks_503-ServiceUnavailable'
        '504':
          $ref: '#/components/responses/Webhooks_504-GatewayTimeout'
      x-amazon-apigateway-integration:
        httpMethod: PUT
        type: http_proxy
        uri: http://PLACEHOLDER_VIEW_LAYER_DNS_NAME/webhooks/{webhookID}
        connectionType: VPC_LINK
        connectionId: PLACEHOLDER_VPC_LINK_ID
        requestParameters:
          integration.request.path.webhookID: method.request.path.webhookID
      servers:
      - url: https://api-mainnet.helius-rpc.com
    delete:
      tags:
      - Webhooks
      summary: Deletes a webhook.
      operationId: webhooks_deleteWebhook
      description: 'Permanently remove a webhook configuration from your account. Immediately stop

        receiving notifications for the specified webhook trigger conditions and free up

        resources for other webhook configurations.

        '
      parameters:
      - $ref: '#/components/parameters/Webhooks_webhookIDParam'
      - $ref: '#/components/parameters/apiKeyParam'
      responses:
        '200':
          $ref: '#/components/responses/Webhooks_200-NoContent'
        '400':
          $ref: '#/components/responses/Webhooks_400-BadRequest'
        '401':
          $ref: '#/components/responses/Webhooks_401-Unauthorized'
        '403':
          $ref: '#/components/responses/Webhooks_403-Forbidden'
        '404':
          $ref: '#/components/responses/Webhooks_404-NotFound'
        '429':
          $ref: '#/components/responses/Webhooks_429-TooManyRequests'
        '500':
          $ref: '#/components/responses/Webhooks_500-InternalServerError'
        '503':
          $ref: '#/components/responses/Webhooks_503-ServiceUnavailable'
        '504':
          $ref: '#/components/responses/Webhooks_504-GatewayTimeout'
      x-amazon-apigateway-integration:
        httpMethod: DELETE
        type: http_proxy
        uri: http://PLACEHOLDER_VIEW_LAYER_DNS_NAME/webhooks/{webhookID}
        connectionType: VPC_LINK
        connectionId: PLACEHOLDER_VPC_LINK_ID
        requestParameters:
          integration.request.path.webhookID: method.request.path.webhookID
      servers:
      - url: https://api-mainnet.helius-rpc.com
    patch:
      tags:
      - Webhooks
      summary: Toggle a webhook on or off.
      operationId: webhooks_toggleWebhook
      description: 'Enable or disable a webhook without deleting it. Use this to re-enable a webhook that

        was automatically disabled due to a high endpoint failure rate, or to temporarily pause

        deliveries. After re-enabling, the webhook enters a 24-hour grace period during which it

        will not be automatically disabled again.

        '
      parameters:
      - $ref: '#/components/parameters/Webhooks_webhookIDParam'
      - $ref: '#/components/parameters/apiKeyParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Webhooks_ToggleWebhookRequest'
      responses:
        '200':
          description: The updated webhook.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Webhooks_Webhook'
        '400':
          $ref: '#/components/responses/Webhooks_400-BadRequest'
        '401':
          $ref: '#/components/responses/Webhooks_401-Unauthorized'
        '403':
          $ref: '#/components/responses/Webhooks_403-Forbidden'
        '404':
          $ref: '#/components/responses/Webhooks_404-NotFound'
        '429':
          $ref: '#/components/responses/Webhooks_429-TooManyRequests'
        '500':
          $ref: '#/components/responses/Webhooks_500-InternalServerError'
        '503':
          $ref: '#/components/responses/Webhooks_503-ServiceUnavailable'
        '504':
          $ref: '#/components/responses/Webhooks_504-GatewayTimeout'
      x-amazon-apigateway-integration:
        httpMethod: PATCH
        type: http_proxy
        uri: http://PLACEHOLDER_VIEW_LAYER_DNS_NAME/webhooks/{webhookID}
        connectionType: VPC_LINK
        connectionId: PLACEHOLDER_VPC_LINK_ID
        requestParameters:
          integration.request.path.webhookID: method.request.path.webhookID
      servers:
      - url: https://api-mainnet.helius-rpc.com
components:
  schemas:
    Webhooks_ErrorResponse:
      type: object
      properties:
        jsonrpc:
          type: string
          description: The JSON-RPC protocol version.
          enum:
          - '2.0'
          example: '2.0'
        error:
          type: object
          properties:
            code:
              type: integer
              description: The error code.
              example: -32602
            message:
              type: string
              description: The error message.
            data:
              type: object
              description: Additional data about the error.
        id:
          type: string
          description: Identifier matching the request.
          example: '1'
    Webhooks_ToggleWebhookRequest:
      type: object
      required:
      - active
      properties:
        active:
          type: boolean
          description: Set to true to enable the webhook or false to disable it.
