                $ref: '#/components/schemas/EnhancedApi_NftName'
        paginationToken:
          $ref: '#/components/schemas/EnhancedApi_PaginationToken'
    EnhancedApi_OnChainMetadata:
      type: object
      description: Metaplex metadata that is stored on-chain.
      properties:
        key:
          type: string
        mint:
          type: string
        updateAuthority:
          type: string
        data:
          type: object
          properties:
            name:
              type: string
            symbol:
              type: string
            uri:
              type: string
            sellerFeeBasisPoints:
              type: integer
            creators:
              type: array
