description: Helius bills as monthly subscription with included credits. LaserStream
  data add-ons ($500-$4,500/month) and Dedicated Nodes ($2,900+/month) are line-itemed
  separately.
notes: Usage in dashboard.
sources:
- https://www.helius.dev/pricing
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Helius Labs, Inc.
serviceCategory: Web3
billingModel:
  pricingCategory: Subscription + Usage
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
focusColumns:
  ServiceName: Helius
  ServiceCategory: Web3
  ProviderName: Helius
  PublisherName: Helius
  InvoiceIssuerName: Helius
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
- name: credits
  description: Helius credits consumed per request, weighted by method.
  unit: credit
  aggregation: sum
  dimensions:
  - api_key
  - method
- name: laserstream_bandwidth
  description: LaserStream gRPC bandwidth consumed.
  unit: byte
  aggregation: sum
  dimensions:
  - stream
- name: dedicated_nodes
  description: Dedicated node hours.
  unit: hour
  aggregation: sum
  dimensions:
  - node
principles:
- name: Visibility
  description: Monitor credit consumption in the Helius dashboard.
- name: Allocation
  description: API key per service; tag environments.
- name: Optimization
  description: Use DAS instead of getProgramAccounts; subscribe instead of poll; size
    LaserStream filters.
- name: Accountability
  description: API-key owners review monthly credit usage.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
